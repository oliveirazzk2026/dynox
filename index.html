  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: "Inter", sans-serif;
      background:#050505;
      color:white;
      min-height:100vh;
      overflow:hidden;

      display:flex;
      align-items:center;
      justify-content:center;

      /* GRID */
      background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  .avatar{
      width:110px;
      height:110px;
      margin:0 auto 30px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,0.1);
      background:
      radial-gradient(circle at top, rgba(255,255,255,0.15), transparent 70%),
      #0b0b0b;
      background-size:40px 40px;
    }

    .container{
      width:100%;
      max-width:500px;
      text-align:center;
      position:relative;
      z-index:2;
    }



      display:flex;
      align-items:center;
      justify-content:center;

      overflow:hidden;

      box-shadow:
      0 0 30px rgba(255,255,255,0.04),
      inset 0 0 20px rgba(255,255,255,0.03);
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    h1{
      font-size:64px;
      font-weight:900;
      letter-spacing:-4px;
      line-height:1;
    }

    .subtitle{
      margin-top:8px;
      color:#777;
      font-size:13px;
      letter-spacing:2px;
    }

    .tags{
      margin-top:20px;
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .tag{
      padding:10px 18px;
      border:1px solid rgba(255,255,255,0.1);
      background:rgba(255,255,255,0.02);
      font-size:12px;
      letter-spacing:2px;
      color:#ddd;
      backdrop-filter:blur(10px);
    }

    .links{
      margin-top:40px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .card{
      width:100%;
      padding:22px;
      border-radius:14px;

      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.06);

      display:flex;
      align-items:center;
      justify-content:space-between;

      text-decoration:none;
      color:white;

      transition:0.25s ease;

      backdrop-filter:blur(12px);

      box-shadow:
      0 0 30px rgba(255,255,255,0.02);
    }

    .card:hover{
      transform:translateY(-4px);
      border-color:rgba(255,255,255,0.18);
      background:rgba(255,255,255,0.05);
    }

    .left{
      display:flex;
      align-items:center;
      gap:16px;
    }

    .icon{
      width:46px;
      height:46px;
      border-radius:12px;

      display:flex;
      align-items:center;
      justify-content:center;

      border:1px solid rgba(255,255,255,0.1);

      background:rgba(255,255,255,0.03);

      font-size:20px;
    }

    .text{
      text-align:left;
    }

    .text h3{
      font-size:18px;
      margin-bottom:4px;
    }

    .text p{
      color:#777;
      font-size:13px;
    }

    .arrow{
      color:#666;
      font-size:20px;
    }

    .footer{
      margin-top:50px;
      color:#555;
      font-size:11px;
      letter-spacing:4px;
    }

    /* glow */
    .glow{
      position:absolute;
      width:500px;
      height:500px;
      background:radial-gradient(circle, rgba(255,255,255,0.05), transparent 70%);
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      z-index:0;
      filter:blur(30px);
    }

    @media(max-width:600px){

      body{
        padding:20px;
      }

      h1{
        font-size:52px;
      }

      .card{
        padding:18px;
      }
    }
  </style>
</head>

<body>

  <div class="glow"></div>

  <div class="container">

<div class="avatar">

</div>
    <h1>dynox</h1>

    <div class="subtitle">

    <div class="tags">

    <div class="links">

  <!-- DISCORD -->

    <div class="left">

      <div class="icon">💬</div>

      <div class="text">

    </div>

  </a>

  <!-- INSTAGRAM -->

    <div class="left">

      <div class="text">

      </div>

    </div>

    <div class="arrow">→</div>

  <!-- SITE -->
  <a class="card" href="https://github.com/oliveirazzk2026" target="_blank">

    <div class="left">

      <div class="icon">🌐</div>

      <div class="text">
        <h3>dynox.dev</h3>
        <p>Site & portfólio</p>
      </div>

    </div>

    <div class="arrow">→</div>

  </a>

</div>
    <div class="footer">
      BUILDING THINGS THAT MATTER
    </div>

  </div>

</body>
</html>
